// ─── UTILS ───
function drawQR(canvas, text) {
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const S = 200; canvas.width = S; canvas.height = S;
  ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, S, S);
  const cell = 6, cols = Math.floor(S/cell), rows = Math.floor(S/cell);
  let seed = 0;
  for (let i = 0; i < text.length; i++) seed = (seed * 31 + text.charCodeAt(i)) >>> 0;
  const rand = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 0xFFFFFFFF; };
  ctx.fillStyle = "#1A3A2A";
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) if (rand() > 0.5) ctx.fillRect(c*cell, r*cell, cell, cell);
  const corner = (x, y) => {
    ctx.fillStyle="#fff";    ctx.fillRect(x,y,7*cell,7*cell);
    ctx.fillStyle="#1A3A2A"; ctx.fillRect(x,y,7*cell,7*cell);
    ctx.fillStyle="#fff";    ctx.fillRect(x+cell,y+cell,5*cell,5*cell);
    ctx.fillStyle="#1A3A2A"; ctx.fillRect(x+2*cell,y+2*cell,3*cell,3*cell);
  };
  corner(0,0); corner((cols-7)*cell,0); corner(0,(rows-7)*cell);
}

}

function DonationModal({ ngo, onClose, showToast }) {
  const [tab,      setTab]      = useState("bank");
  const [amount,   setAmount]   = useState(500);
  const [custom,   setCustom]   = useState("");
  const canvasRef = useRef(null);

  useEffect(() => {
    if (tab === "upi") {
      // slight delay to ensure canvas is mounted
      setTimeout(() => { if (canvasRef.current) drawQR(canvasRef.current, ngo.upi.id); }, 50);
    }
  }, [tab, ngo.upi.id]);

  const handleDonate = () => {
    const final = custom ? parseInt(custom) : amount;
    if (!final || final < 1) { showToast("Please select or enter an amount"); return; }
    showToast(`Proceeding to donate ₹${final.toLocaleString("en-IN")} ♥`);
  };

  const TABS = [{ id:"bank",label:"🏦 Bank Transfer"},{ id:"upi",label:"📱 UPI / QR Code"},{ id:"other",label:"💡 Other Ways"}];
  const AMOUNTS = [500,1000,2000,5000,10000];

  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()}
      style={{ position:"fixed", inset:0, zIndex:1000, background:"rgba(0,0,0,0.78)", backdropFilter:"blur(8px)", display:"flex", alignItems:"center", justifyContent:"center", padding:"1rem", animation:"fadeIn 0.25s ease" }}>

        {/* Header */}
        <div style={{ padding:"1.8rem 2rem", borderBottom:`1px solid ${T.border}`, display:"flex", justifyContent:"space-between", alignItems:"flex-start", background:`linear-gradient(135deg,${ngo.accent}10 0%,transparent 60%)` }}>
          <div>
            <div style={{ fontSize:"0.67rem", letterSpacing:"2px", textTransform:"uppercase", color:ngo.accent, fontWeight:600, marginBottom:"0.4rem" }}>{ngo.type} · {ngo.city}</div>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"1.85rem", fontWeight:700, color:T.white }}>{ngo.name}</div>
          </div>
          <button onClick={onClose} style={{ background:T.bgLight, border:`1px solid ${T.border}`, color:T.muted, width:"36px", height:"36px", borderRadius:"8px", fontSize:"1rem", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.2s" }}

            <div>
              {[["Mission",ngo.desc],["Address",ngo.address],["City / State",`${ngo.city}, ${ngo.state}`]].map(([lb,v])=>(
                <div key={lb} style={{ marginBottom:"1rem" }}>
                  <div style={{ fontSize:"0.63rem", letterSpacing:"1.5px", textTransform:"uppercase", color:T.muted, fontWeight:600, marginBottom:"0.3rem" }}>{lb}</div>

          {tab==="upi" && (
            <div style={{ textAlign:"center", padding:"1rem 0" }}>
              <div style={{ display:"inline-block", background:"#fff", border:`2px solid ${T.border}`, borderRadius:"16px", padding:"1.5rem", boxShadow:"0 8px 30px rgba(0,0,0,0.2)", marginBottom:"1.2rem" }}>
                <canvas ref={canvasRef} width={200} height={200} style={{ display:"block" }} />
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"1rem", fontWeight:700, color:"#1A3A2A", marginTop:"0.8rem" }}>{ngo.upi.name}</div>
                <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:"0.78rem", color:"#666", marginTop:"0.2rem" }}>{ngo.upi.id}</div>
              </div>
              <div style={{ display:"flex", gap:"0.6rem", justifyContent:"center", flexWrap:"wrap", marginBottom:"0.8rem" }}>
                {[["G Pay","#4285F4","#fff"],["PhonePe","#5f259f","#fff"],["Paytm","#002970","#fff"],["BHIM",T.bgLight,T.sage]].map(([nm,bg,col])=>(
                  <span key={nm} style={{ padding:"0.42rem 1rem", borderRadius:"5px", fontSize:"0.77rem", fontWeight:700, background:bg, color:col, border:`1.5px solid ${bg}` }}>{nm}</span>
                ))}
              </div>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:"0.5rem" }}>
                <span style={{ fontSize:"0.76rem", color:T.muted }}>UPI: {ngo.upi.id}</span>
                <CopyBtn value={ngo.upi.id} />
              </div>
              <p style={{ fontSize:"0.74rem", color:T.muted, marginTop:"0.8rem" }}>Scan with any UPI app. Enter your chosen amount and complete the payment.</p>
            </div>
          )}

          {/* ── OTHER TAB ── */}
          {tab==="other" && (
            <div className="other-grid" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"1rem" }}>
              {[
                { icon:"📮", title:"Demand Draft / Cheque", desc:`Draw in favor of "${ngo.bank.accName}" and mail or hand-deliver to their registered address.` },
                { icon:"💻", title:"Online Portal", desc:"This organization has its own secure donation portal for card/net banking.", link:ngo.portal },
                { icon:"🏛️", title:"CSR / Corporate Donation", desc:"For bulk or CSR donations, contact the organization to arrange MOU and documentation." },
                { icon:"📦", title:"In-Kind Donation", desc:"Donate food, clothing, books, or medicine. Contact the NGO for their current needs." },
              ].map((item,i)=>(
                <div key={i} style={{ background:T.bgLight, border:`1px solid ${T.border}`, borderRadius:"10px", padding:"1.2rem" }}>
                  <div style={{ fontSize:"1.4rem", marginBottom:"0.5rem" }}>{item.icon}</div>
                  <div style={{ fontSize:"0.84rem", fontWeight:600, color:T.white, marginBottom:"0.4rem" }}>{item.title}</div>
                  <div style={{ fontSize:"0.76rem", color:T.muted, lineHeight:1.5 }}>{item.desc}</div>
                  {item.link && <a href={item.link} target="_blank" rel="noreferrer" style={{ display:"inline-block", marginTop:"0.5rem", fontSize:"0.77rem", color:T.sage, fontWeight:600 }}>Visit Portal →</a>}
                </div>
              ))}
            </div>
          )}

          {/* CTA */}
          <div style={{ marginTop:"1.8rem", textAlign:"center", paddingTop:"1.5rem", borderTop:`1px solid ${T.border}` }}>
            <button onClick={handleDonate} style={{ background:`linear-gradient(135deg,${ngo.accent},${ngo.accent}CC)`, color:"#fff", border:"none", borderRadius:"8px", padding:"0.95rem 3.5rem", fontSize:"1rem", fontWeight:700, letterSpacing:"0.3px", boxShadow:`0 8px 30px ${ngo.accent}40`, transition:"all 0.25s" }}
              onMouseEnter={e=>{ e.currentTarget.style.transform="translateY(-3px)"; e.currentTarget.style.boxShadow=`0 14px 40px ${ngo.accent}55`; }}
              onMouseLeave={e=>{ e.currentTarget.style.transform="translateY(0)"; e.currentTarget.style.boxShadow=`0 8px 30px ${ngo.accent}40`; }}>
              Donate Now ♥
            </button>
            <p style={{ fontSize:"0.72rem", color:T.muted, marginTop:"0.7rem" }}>SevaSangam does not process payments. Donations go directly to the organization. Ask for 80G receipt for tax benefits.</p>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── FOOTER ───
function Footer() {
  return (
    <>
      <footer className="footer-grid" style={{ background:"#080F0A", color:T.muted, padding:"3.5rem 5%", display:"grid", gridTemplateColumns:"2fr 1fr 1fr 1fr", gap:"3rem", borderTop:`1px solid ${T.border}` }}>
        <div>
          <Logo />
          <p style={{ fontSize:"0.84rem", lineHeight:1.72, marginTop:"1rem", maxWidth:"260px", color:T.muted }}>Bridging compassionate donors with verified social organizations across India. Transparent. Direct. Impactful.</p>
          <div style={{ marginTop:"1.2rem", display:"flex", gap:"0.5rem" }}>
            {["Twitter","Instagram","LinkedIn"].map(s=>(
              <span key={s} style={{ padding:"0.28rem 0.7rem", borderRadius:"4px", border:`1px solid ${T.border}`, fontSize:"0.7rem", color:T.muted, cursor:"pointer" }}>{s}</span>
            ))}
          </div>
        </div>
        {[["Explore",["All NGOs","Orphanages","Events","Cities"]],["Platform",["List Your NGO","Admin Login","API Docs","Contact"]],["Legal",["Privacy Policy","Terms of Use","About Us","Disclaimer"]]].map(([title,links])=>(
          <div key={title}>
            <h4 style={{ color:T.white, fontSize:"0.78rem", fontWeight:600, letterSpacing:"1px", textTransform:"uppercase", marginBottom:"1rem" }}>{title}</h4>
            {links.map(l=>(
              <a key={l} href="#" style={{ display:"block", color:T.muted, fontSize:"0.84rem", marginBottom:"0.5rem", transition:"color 0.2s" }}
                onMouseEnter={e=>e.target.style.color=T.amber} onMouseLeave={e=>e.target.style.color=T.muted}>{l}</a>
            ))}
          </div>
        ))}
      </footer>
      <div style={{ background:"#040C07", color:"rgba(255,255,255,0.2)", textAlign:"center", padding:"1rem 5%", fontSize:"0.74rem", borderTop:`1px solid ${T.border}` }}>
        © 2025 SevaSangam. Built with ♥ for India's social sector. Zero platform fees on donations.
      </div>
    </>
  );
}

// ─── ROOT APP ───
function App() {
  const [query,  setQuery]  = useState("");
  const [city,   setCity]   = useState("");
  const [type,   setType]   = useState("");
  const [chip,   setChip]   = useState("");
  const [list,   setList]   = useState(NGOS);
  const [modal,  setModal]  = useState(null);
  const [toast,  setToast]  = useState({ show:false, msg:"" });
  const ngoRef = useRef(null);

  const showToast = useCallback((msg) => {
    setToast({ show:true, msg });
    setTimeout(()=>setToast({ show:false, msg:"" }), 2800);
  }, []);

  const doFilter = useCallback(() => {
    const q = query.toLowerCase();
    setList(NGOS.filter(n => {
      const mQ    = !q    || n.name.toLowerCase().includes(q) || n.desc.toLowerCase().includes(q);
      const mCity = !city || n.city === city;
      const mType = !type || n.type === type;
      const mChip = !chip || n.type === chip || n.city === chip;
      return mQ && mCity && mType && mChip;
    }));
  }, [query, city, type, chip]);

  useEffect(() => { doFilter(); }, [chip, doFilter]);

  const handleChip = useCallback((v) => setChip(v), []);
  const handleExplore = () => ngoRef.current?.scrollIntoView({ behavior:"smooth" });

  return (
    <>
      <FontLink />
      <div style={{ background:T.bg, minHeight:"100vh", overflowX:"hidden" }}>
        <Nav onList={()=>showToast("NGO listing form coming soon!")} />
        <Hero onExplore={handleExplore} />
        <Ticker />
        <div ref={ngoRef}>
          <SearchBar query={query} setQuery={setQuery} city={city} setCity={setCity} type={type} setType={setType} onSearch={doFilter} chip={chip} setChip={handleChip} />
        </div>
        <NGOSection ngos={list} onOpen={setModal} />
        <EventsSection />
        <HowSection />
        <Footer />
        {modal && <DonationModal ngo={modal} onClose={()=>setModal(null)} showToast={showToast} />}
        <Toast msg={toast.msg} show={toast.show} />
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
