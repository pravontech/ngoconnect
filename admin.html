<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SevaSangam Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:#0D1F14;color:#FDFAF4;min-height:100vh;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#0D1F14;}::-webkit-scrollbar-thumb{background:#3A7D50;border-radius:2px;}
input,select,textarea{font-family:'Outfit',sans-serif;outline:none;}
button{cursor:pointer;font-family:'Outfit',sans-serif;}
a{text-decoration:none;color:inherit;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.fl{font-size:0.67rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(253,250,244,0.42);font-weight:600;display:block;margin-bottom:0.38rem;}
.fi{width:100%;padding:0.72rem 1rem;background:#162A1D;border:1.5px solid rgba(255,255,255,0.07);border-radius:7px;color:#FDFAF4;font-size:0.88rem;transition:border-color 0.2s;}
.fi:focus{border-color:#5BAF73;box-shadow:0 0 0 3px rgba(91,175,115,0.1);}
select.fi{cursor:pointer;}
textarea.fi{resize:vertical;}
.fg{margin-bottom:1rem;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0.9rem;}
.full{grid-column:1/-1;}
.page{display:none;}
.page.active{display:block;}
#dashPage.active{display:flex;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.sidebar{width:235px;background:#080F0A;border-right:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;z-index:100;overflow-y:auto;}
.nav-btn{width:100%;text-align:left;padding:0.68rem 0.8rem;border-radius:6px;border:none;background:transparent;color:rgba(253,250,244,0.48);font-size:0.84rem;font-weight:400;display:flex;align-items:center;gap:0.6rem;margin-bottom:0.15rem;border-left:2px solid transparent;transition:all 0.18s;cursor:pointer;}
.nav-btn:hover{background:rgba(255,255,255,0.04);}
.nav-btn.active{background:rgba(91,175,115,0.14);color:#A8DFBA;font-weight:600;border-left-color:#5BAF73;}
.main{margin-left:235px;flex:1;padding:2rem 2.5rem;min-height:100vh;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
.stat-card{background:#111F17;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:1.2rem;}
.data-table{width:100%;border-collapse:collapse;background:#111F17;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);}
.data-table th{padding:0.85rem 0.9rem;text-align:left;font-size:0.66rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(253,250,244,0.38);font-weight:600;background:#0D1F14;border-bottom:1px solid rgba(255,255,255,0.07);}
.data-table td{padding:0.85rem 0.9rem;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.86rem;vertical-align:middle;}
.data-table tr:hover td{background:rgba(255,255,255,0.025);}
.data-table tr:last-child td{border-bottom:none;}
.btn-primary{background:linear-gradient(135deg,#5BAF73,#3A8A4E);color:#fff;border:none;border-radius:7px;font-weight:600;padding:0.85rem 1.5rem;font-size:0.95rem;cursor:pointer;transition:transform 0.18s,box-shadow 0.18s;box-shadow:0 4px 20px rgba(91,175,115,0.28);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(91,175,115,0.38);}
.btn-sm-edit{background:rgba(91,175,115,0.12);border:1px solid rgba(91,175,115,0.25);color:#5BAF73;border-radius:5px;padding:0.3rem 0.7rem;font-size:0.74rem;cursor:pointer;}
.btn-sm-edit:hover{background:rgba(91,175,115,0.25);}
.btn-sm-del{background:rgba(196,97,58,0.12);border:1px solid rgba(196,97,58,0.25);color:#C4613A;border-radius:5px;padding:0.3rem 0.7rem;font-size:0.74rem;cursor:pointer;}
.btn-sm-del:hover{background:rgba(196,97,58,0.25);}
.btn-sm-apr{background:rgba(168,196,74,0.12);border:1px solid rgba(168,196,74,0.25);color:#A8C44A;border-radius:5px;padding:0.3rem 0.7rem;font-size:0.74rem;cursor:pointer;}
.pending-card{background:#111F17;border:1px solid rgba(240,184,74,0.18);border-radius:10px;padding:1.4rem;display:flex;justify-content:space-between;align-items:center;gap:1.5rem;flex-wrap:wrap;margin-bottom:1rem;}
.settings-box{background:#111F17;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:1.7rem;margin-bottom:1.2rem;max-width:480px;}
#modalBg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);backdrop-filter:blur(8px);z-index:500;align-items:center;justify-content:center;padding:1rem;}
#modalBg.open{display:flex;}
#modalBox{background:#111F17;border:1px solid rgba(255,255,255,0.09);border-radius:14px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,0.6);animation:fadeUp 0.3s ease;}
.upload-zone{border:2px dashed rgba(91,175,115,0.3);border-radius:8px;padding:1.2rem;text-align:center;cursor:pointer;background:rgba(91,175,115,0.03);transition:all 0.2s;}
.upload-zone:hover{border-color:#5BAF73;background:rgba(91,175,115,0.07);}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:0.4rem;margin-top:0.5rem;}
.img-thumb{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;background:#0D1F14;border:1px solid rgba(255,255,255,0.07);}
.img-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
#toast{position:fixed;bottom:2rem;right:2rem;z-index:9999;padding:0.8rem 1.6rem;border-radius:8px;font-size:0.88rem;font-weight:600;box-shadow:0 12px 40px rgba(0,0,0,0.4);opacity:0;transform:translateY(24px);transition:all 0.3s;pointer-events:none;color:#fff;}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="page active">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0D1F14;position:relative;overflow:hidden;">
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(91,175,115,0.1),transparent 65%);pointer-events:none;"></div>
    <div style="background:#111F17;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 40px 100px rgba(0,0,0,0.5);position:relative;z-index:1;animation:fadeUp 0.4s ease both;">
      <div style="text-align:center;margin-bottom:2rem;">
        <div style="font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;">Seva<span style="color:#D4A043;">Sangam</span></div>
        <div style="font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;color:rgba(253,250,244,0.35);margin-top:0.3rem;">Admin Dashboard</div>
      </div>
      <div id="loginErr" style="display:none;background:rgba(196,97,58,0.15);border:1px solid rgba(196,97,58,0.4);border-radius:6px;padding:0.7rem 1rem;font-size:0.83rem;color:#E07050;margin-bottom:1rem;"></div>
      <div class="fg">
        <label class="fl" for="loginUser">Username</label>
        <input class="fi" type="text" id="loginUser" placeholder="admin" value="admin" autocomplete="username"/>
      </div>
      <div class="fg" style="margin-bottom:1.5rem;">
        <label class="fl" for="loginPass">Password</label>
        <input class="fi" type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" id="loginBtn" style="width:100%;">Sign In</button>
      <div style="text-align:center;margin-top:1.2rem;font-size:0.74rem;color:rgba(253,250,244,0.28);">Default: admin / sevasangam2025</div>
      <div style="text-align:center;margin-top:0.6rem;"><a href="index.html" style="font-size:0.78rem;color:#5BAF73;">Back to SevaSangam</a></div>
    </div>
  </div>
</div>

<!-- DASHBOARD PAGE -->
<div id="dashPage" class="page">
  <aside class="sidebar">
    <div style="padding:1.4rem;border-bottom:1px solid rgba(255,255,255,0.07);">
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;">Seva<span style="color:#D4A043;">Sangam</span></div>
      <div style="font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;color:rgba(253,250,244,0.3);margin-top:0.2rem;">Admin Panel</div>
    </div>
    <nav style="padding:0.8rem;flex:1;">
      <button class="nav-btn active" id="tab-ngos"     onclick="switchTab('ngos')">&#127963; Organizations</button>
      <button class="nav-btn"        id="tab-events"   onclick="switchTab('events')">&#128197; Events</button>
      <button class="nav-btn"        id="tab-pending"  onclick="switchTab('pending')">&#9203; Approvals <span id="pendingBadge" style="background:#C4613A;color:#fff;font-size:0.58rem;padding:0.08rem 0.4rem;border-radius:10px;margin-left:0.3rem;display:none;"></span></button>
      <button class="nav-btn"        id="tab-settings" onclick="switchTab('settings')">&#9881; Settings</button>
    </nav>
    <div style="padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,0.07);">

      <button onclick="doLogout()" style="width:100%;padding:0.48rem;background:rgba(196,97,58,0.13);border:1px solid rgba(196,97,58,0.28);border-radius:5px;color:#E07050;font-size:0.78rem;cursor:pointer;">Sign Out</button>
      <a href="index.html" style="display:block;text-align:center;margin-top:0.5rem;font-size:0.73rem;color:#5BAF73;">Back to Site</a>
    </div>
  </aside>

  <main class="main">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;">
      <div>
        <div id="tabTitle" style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;"></div>
        <div id="tabSub"   style="font-size:0.76rem;color:rgba(253,250,244,0.38);margin-top:0.15rem;"></div>
      </div>
      <div id="topActions" style="display:flex;gap:0.7rem;flex-wrap:wrap;align-items:center;"></div>
    </div>

    <!-- Stats -->
    <div class="stat-grid">
      <div class="stat-card" style="border-top:2px solid rgba(91,175,115,0.22);">
        <div style="font-size:0.66rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(253,250,244,0.38);font-weight:600;margin-bottom:0.4rem;">Total NGOs</div>
        <div id="statTotal" style="font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;">0</div>
      </div>
      <div class="stat-card" style="border-top:2px solid rgba(168,196,74,0.22);">
        <div style="font-size:0.66rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(253,250,244,0.38);font-weight:600;margin-bottom:0.4rem;">Approved</div>
        <div id="statApproved" style="font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;">0</div>
      </div>
      <div class="stat-card" style="border-top:2px solid rgba(240,184,74,0.22);">
        <div style="font-size:0.66rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(253,250,244,0.38);font-weight:600;margin-bottom:0.4rem;">Pending</div>
        <div id="statPending" style="font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;">0</div>
      </div>
      <div class="stat-card" style="border-top:2px solid rgba(74,191,191,0.22);">
        <div style="font-size:0.66rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(253,250,244,0.38);font-weight:600;margin-bottom:0.4rem;">Events</div>
        <div id="statEvents" style="font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;">0</div>
      </div>
    </div>

    <!-- NGOs Panel -->
    <div class="tab-panel active" id="panel-ngos">
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead><tr>
            <th style="width:46px;"></th>
            <th>Organization</th><th>Type</th><th>City</th><th>Status</th><th>Actions</th>
          </tr></thead>
          <tbody id="ngoBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Events Panel -->
    <div class="tab-panel" id="panel-events">
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead><tr>
            <th>Event</th><th>Organization</th><th>Date</th><th>Location</th><th>Actions</th>
          </tr></thead>
          <tbody id="evBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Pending Panel -->
    <div class="tab-panel" id="panel-pending">
      <div id="pendingList"></div>
    </div>

    <!-- Settings Panel -->
    <div class="tab-panel" id="panel-settings">
      <div class="settings-box">
        <div style="font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;margin-bottom:1.2rem;">Change Admin Password</div>
        <div class="fg"><label class="fl">Current Password</label><input class="fi" type="password" id="curPass"/></div>
        <div class="fg"><label class="fl">New Password</label><input class="fi" type="password" id="newPass"/></div>
        <div class="fg"><label class="fl">Confirm Password</label><input class="fi" type="password" id="conPass"/></div>
        <button class="btn-primary" onclick="changePass()" style="padding:0.62rem 1.4rem;font-size:0.86rem;">Update Password</button>
      </div>
      <div class="settings-box">
        <div style="font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;margin-bottom:0.9rem;">Platform Stats</div>
        <div id="settingsStats"></div>
      </div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div id="modalBg" onclick="if(event.target===this)closeModal()">
  <div id="modalBox">
    <div style="padding:1.6rem 1.8rem;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;justify-content:space-between;align-items:center;">
      <div id="modalTitle" style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;"></div>
      <button onclick="closeModal()" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(253,250,244,0.5);width:32px;height:32px;border-radius:6px;font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;">&#10005;</button>
    </div>
    <div id="modalBody" style="padding:1.6rem 1.8rem;"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── CREDENTIALS ──
var ADMIN_USER = "admin";
var ADMIN_PASS = "sevasangam2025";

// ── DATA ──
var NGOS = [
  {id:1,name:"Asha Ki Kiran Trust",type:"NGO",city:"Pune",state:"Maharashtra",desc:"Empowering underprivileged women and children through education, skill training, and healthcare access since 2009.",address:"14, Deccan Gymkhana, Pune - 411004",phone:"+91 98765 43210",email:"info@ashakiran.org",website:"www.ashakiran.org",since:"2009",accent:"#5BAF73",beneficiaries:"12,400+",status:"approved",logo:null,photos:[],bank:{accName:"Asha Ki Kiran Trust",accNum:"30987654321",ifsc:"SBIN0012345",bankName:"State Bank of India",branch:"Deccan Gymkhana, Pune",accType:"Savings"},upi:{id:"ashakiran@sbi",name:"Asha Ki Kiran Trust"},portal:"https://ashakiran.org/donate",tags:["Women Empowerment","Education","Healthcare"]},

  {id:4,name:"Disha Swayam Siddha",type:"NGO",city:"Nagpur",state:"Maharashtra",desc:"Rural women empowerment through microfinance and legal aid in Vidarbha.",address:"Plot 22, Dharampeth, Nagpur - 440010",phone:"+91 88765 12345",email:"disha@swayam.net",website:"www.dishaswayam.net",since:"2011",accent:"#4ABFBF",beneficiaries:"6,200+",status:"approved",logo:null,photos:[],bank:{accName:"Disha Swayam Siddha",accNum:"5678901234567",ifsc:"ICIC0001122",bankName:"ICICI Bank",branch:"Dharampeth, Nagpur",accType:"Savings"},upi:{id:"dishaswayam@icici",name:"Disha Swayam Siddha"},portal:"https://dishaswayam.net/donate",tags:["Microfinance","Rural Women","Legal Aid"]},

var EVENTS = [
  {id:1,ngoId:1,title:"Winter Clothing Drive",desc:"Distribute warm clothing to 500+ families.",date:"2025-12-20",location:"Deccan Gymkhana, Pune"},
  {id:2,ngoId:2,title:"Free Medical Camp",desc:"Health check-up for children and senior citizens.",date:"2026-01-05",location:"Panchavati, Nashik"},
  {id:3,ngoId:3,title:"Tree Plantation Drive",desc:"Plant 1,000 native trees in Aarey Colony.",date:"2026-01-14",location:"Aarey Colony, Mumbai"},
  {id:4,ngoId:4,title:"Women Skill Fair",desc:"Showcase of handicrafts and NRLM products.",date:"2026-01-22",location:"Dharampeth, Nagpur"},
  {id:5,ngoId:5,title:"Annual Sports Meet",desc:"Inter-orphanage sports tournament.",date:"2026-02-01",location:"Mehrauli, Delhi"},
  {id:6,ngoId:6,title:"Farmer Awareness Camp",desc:"Soil testing and crop insurance guidance.",date:"2026-02-10",location:"CIDCO, Aurangabad"}
];
var nextNgoId = 7;
var nextEvId  = 7;
var activeTab = "ngos";
var ngoFilter = "all";
var ngoSearch = "";
var toastTimer;
var modalLogo   = null;
var modalPhotos = [];
var editNgoId   = null;
var editEvId    = null;

// ── UTILS ──
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function gv(id){ var e=document.getElementById(id); return e ? e.value.trim() : ""; }
function ge(id){ return document.getElementById(id); }
function ngoName(id){ var n=NGOS.find(function(x){return x.id===id;}); return n?n.name:"Unknown"; }

function toast(msg, type){
  clearTimeout(toastTimer);
  var t=ge("toast");
  t.textContent=(type==="error"?"⚠ ":"✓ ")+msg;
  t.style.background=type==="error"?"#C4613A":"#5BAF73";
  t.style.opacity="1"; t.style.transform="translateY(0)";
  toastTimer=setTimeout(function(){ t.style.opacity="0"; t.style.transform="translateY(24px)"; },2800);
}

function updateStats(){
  var ap=NGOS.filter(function(n){return n.status==="approved";}).length;
  var pd=NGOS.filter(function(n){return n.status==="pending";}).length;
  ge("statTotal").textContent=NGOS.length;
  ge("statApproved").textContent=ap;
  ge("statPending").textContent=pd;
  ge("statEvents").textContent=EVENTS.length;
  var badge=ge("pendingBadge");
  if(pd>0){ badge.textContent=pd; badge.style.display="inline"; }
  else { badge.style.display="none"; }
}

// ── LOGIN ──
ge("loginBtn").addEventListener("click", doLogin);
ge("loginPass").addEventListener("keydown", function(e){ if(e.key==="Enter") doLogin(); });

function doLogin(){
  var u=gv("loginUser"), p=gv("loginPass");
  if(u===ADMIN_USER && p===ADMIN_PASS){
    ge("loginErr").style.display="none";
    ge("loginPage").classList.remove("active");
    ge("dashPage").classList.add("active");
    ge("adminNameEl").textContent=ADMIN_USER;
    updateStats();

function saveNgo(){
  var name=gv("fName"),email=gv("fEmail"),desc=gv("fDesc");
  if(!name){toast("Organization name is required","error");return;}
  if(!email){toast("Email is required","error");return;}
  if(!desc){toast("Description is required","error");return;}
  var ACCENTS=["#5BAF73","#D4A043","#7BC67A","#4ABFBF","#A86FD4","#A8C44A","#C4613A"];
  var data={name:name,email:email,desc:desc,type:gv("fType"),status:gv("fStatus"),city:gv("fCity"),state:gv("fState"),phone:gv("fPhone"),website:gv("fWebsite"),since:gv("fSince"),beneficiaries:gv("fBen"),address:gv("fAddr"),logo:modalLogo,photos:modalPhotos.slice(),bank:{accName:gv("fAccName"),accNum:gv("fAccNum"),ifsc:gv("fIFSC"),bankName:gv("fBankName"),branch:gv("fBranch"),accType:gv("fAccType")},upi:{id:gv("fUpiId"),name:gv("fUpiName")},portal:gv("fPortal")};
  if(editNgoId){
    var idx=NGOS.findIndex(function(x){return x.id===editNgoId;});
    if(idx>-1){data.id=editNgoId;data.accent=NGOS[idx].accent;data.tags=NGOS[idx].tags||[];NGOS[idx]=Object.assign({},NGOS[idx],data);toast(name+" updated");}
  } else {
    data.id=nextNgoId++;data.accent=ACCENTS[data.id%ACCENTS.length];data.tags=[];NGOS.push(data);toast(name+" added");
  }
  closeModal(); updateStats(); switchTab("ngos");
}

  g2.appendChild(makeField("evTitle","Event Title *",v.title,true));

  var ngoFg=document.createElement("div"); ngoFg.className="fg";
  var ngoLbl=document.createElement("label"); ngoLbl.className="fl"; ngoLbl.textContent="Organization";
  var ngoSel=document.createElement("select"); ngoSel.className="fi"; ngoSel.id="evNgo";
  NGOS.forEach(function(n){ var o=document.createElement("option"); o.value=n.id; o.textContent=n.name; o.style.background="#0D1F14"; if(n.id===v.ngoId)o.selected=true; ngoSel.appendChild(o); });
  ngoFg.appendChild(ngoLbl); ngoFg.appendChild(ngoSel); g2.appendChild(ngoFg);

  g2.appendChild(makeField("evDate","Event Date",v.date));
  ge("evDate") && (document.getElementById("evDate") ? document.getElementById("evDate").type="date" : null);
  g2.appendChild(makeField("evLoc","Location",v.location,true));
  g2.appendChild(makeTextarea("evDesc","Description",v.desc));
  body.appendChild(g2);

  // Fix date input type after DOM insert
  setTimeout(function(){ var d=ge("evDate"); if(d) d.type="date"; },10);

  var footer=document.createElement("div"); footer.style.cssText="display:flex;gap:0.7rem;justify-content:flex-end;margin-top:1.2rem;";
  var cb=document.createElement("button"); cb.style.cssText="background:transparent;border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:rgba(253,250,244,0.6);font-size:0.86rem;padding:0.62rem 1.4rem;cursor:pointer;"; cb.textContent="Cancel"; cb.addEventListener("click",closeModal);
  var sb=document.createElement("button"); sb.className="btn-primary"; sb.style.cssText="padding:0.62rem 1.7rem;font-size:0.86rem;"; sb.textContent=ev?"Save Changes":"Add Event"; sb.addEventListener("click",saveEv);
  footer.appendChild(cb); footer.appendChild(sb); body.appendChild(footer);
  openModal();
}

function saveEv(){
  var title=gv("evTitle");
  if(!title){toast("Event title is required","error");return;}
  var evNgoEl=ge("evNgo");
  var data={title:title,desc:gv("evDesc"),date:gv("evDate"),location:gv("evLoc"),ngoId:evNgoEl?parseInt(evNgoEl.value)||1:1};
  if(editEvId){
    var idx=EVENTS.findIndex(function(x){return x.id===editEvId;});
    if(idx>-1){data.id=editEvId;EVENTS[idx]=Object.assign({},EVENTS[idx],data);toast("Event updated");}
  } else {
    data.id=nextEvId++;EVENTS.push(data);toast("Event added");
  }
  closeModal(); updateStats(); renderEvTable();
}

// ── MODAL PHOTO/LOGO ──
function handleModalLogo(e){
  var file=e.target.files[0]; if(!file)return;
  if(file.size>2097152){toast("Logo must be under 2MB","error");return;}
  var r=new FileReader();
  r.onload=function(ev){
    modalLogo=ev.target.result;
    var i=ge("mLogoImg"); if(i){i.src=modalLogo;i.style.display="block";}
    var p=ge("mLogoPlc"); if(p)p.style.display="none";
    var rb=ge("mLogoRem"); if(rb)rb.style.display="block";
  };
  r.readAsDataURL(file);
}
function removeModalLogo(){
  modalLogo=null;
  var i=ge("mLogoImg"); if(i){i.style.display="none";i.src="";}
  var p=ge("mLogoPlc"); if(p)p.style.display="flex";
  var rb=ge("mLogoRem"); if(rb)rb.style.display="none";
  var inp=ge("mLogoIn"); if(inp)inp.value="";
}
function handleModalPhotos(e){
  var files=Array.from(e.target.files), rem=5-modalPhotos.length;
  if(files.length>rem)toast("Only "+rem+" more photo(s) can be added","error");
  files.slice(0,rem).forEach(function(f){
    if(f.size>5242880){toast(f.name+" exceeds 5MB","error");return;}
    var r=new FileReader(); r.onload=function(ev){modalPhotos.push({dataUrl:ev.target.result,name:f.name});renderModalPhotos();}; r.readAsDataURL(f);
  });
  var inp=ge("mPhotoIn"); if(inp)inp.value="";
}
function removeModalPhoto(i){ modalPhotos.splice(i,1); renderModalPhotos(); }
function renderModalPhotos(){
  var g=ge("mPhotoGrid"),c=ge("mPhotoCnt"); if(!g)return;
  if(c)c.textContent=modalPhotos.length+" / 5 photos";
  g.innerHTML="";
  modalPhotos.forEach(function(p,i){
    var thumb=document.createElement("div"); thumb.className="img-thumb";
    var img=document.createElement("img"); img.src=p.dataUrl;
    var btn=document.createElement("button"); btn.style.cssText="position:absolute;top:2px;right:2px;background:rgba(196,97,58,0.88);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:0.58rem;cursor:pointer;display:flex;align-items:center;justify-content:center;"; btn.innerHTML="&#10005;";
    (function(idx){ btn.addEventListener("click",function(){ removeModalPhoto(idx); }); })(i);
    thumb.appendChild(img); thumb.appendChild(btn); g.appendChild(thumb);
  });
}

// ── MODAL ──
function openModal(){ ge("modalBg").classList.add("open"); }
function closeModal(){ ge("modalBg").classList.remove("open"); ge("modalBody").innerHTML=""; modalLogo=null; modalPhotos=[]; }

// ── BOOT ──
ge("loginPass").focus();
</script>
