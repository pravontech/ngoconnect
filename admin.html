// ── STATE ──
let loggedIn = false;

// ── HELPERS ──
function $(id){ return document.getElementById(id); }
function showToast(msg, type="success"){
  clearTimeout(toastTimer);
  const el = $("toast");
  el.textContent = (type==="success"?"✓ ":"⚠ ") + msg;
  el.style.background = type==="success"?"#5BAF73":"#C4613A";
  el.style.transform = "translateY(0)"; el.style.opacity = "1";
  toastTimer = setTimeout(()=>{ el.style.transform="translateY(24px)"; el.style.opacity="0"; }, 2800);
}
function getNgoName(id){ const n=STORE.ngos.find(x=>x.id===id); return n?n.name:"Unknown"; }
function escH(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── RENDER ──
function render(){
  const app = document.getElementById("app");
  if(currentPage==="login") { app.innerHTML = renderLogin(); bindLogin(); return; }
  app.innerHTML = renderShell();
  bindShell();
  renderContent();
}

// ── LOGIN ──

function bindLogin(){
  // auto focus
  setTimeout(()=>{ const p=$("loginPass"); if(p)p.focus(); },100);
}

function doLogin(){
  const u=$("loginUser").value.trim();
  const p=$("loginPass").value.trim();
  if(u===STORE.admin.user && p===STORE.admin.pass){
    loggedIn=true; currentPage="dashboard"; render();
  } else {
    const err=$("loginErr");
    err.textContent="Invalid username or password. Please try again.";
    err.style.display="block";
  }
}

function bindShell(){
  $("modalBackdrop").addEventListener("click", function(e){ if(e.target===this) closeModal(); });
}

function setTab(tab){ activeTab=tab; filterStatus="all"; searchQ=""; renderContent(); }
function doLogout(){ loggedIn=false; currentPage="login"; render(); }

function renderContent(){
  const titles={"ngos":"Organizations","events":"Events","pending":"Pending Approvals","settings":"Settings"};
  const subs={"ngos":"Add, edit or remove NGO listings","events":"Manage upcoming events & drives","pending":"Review and approve new NGO submissions","settings":"Platform configuration"};
  if($("pageTitle")) $("pageTitle").textContent = titles[activeTab]||"";
  if($("pageSubtitle")) $("pageSubtitle").textContent = subs[activeTab]||"";

  if(activeTab==="ngos") renderNGOTab();
  else if(activeTab==="events") renderEventsTab();
  else if(activeTab==="pending") renderPendingTab();
  else if(activeTab==="settings") renderSettingsTab();
}

function fld(id,label,val,selVal,options,isSelect,span,type){
  const lblStyle="font-size:0.67rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(253,250,244,0.4);font-weight:600;display:block;margin-bottom:0.35rem;";
  const inputStyle="width:100%;padding:0.65rem 0.9rem;background:#162A1D;border:1.5px solid rgba(255,255,255,0.07);border-radius:6px;color:#FDFAF4;font-size:0.86rem;transition:border-color 0.2s;";
  const wrap = span==="full"?"grid-column:1/-1":"";
  if(isSelect && options){
    return `<div style="${wrap}"><label style="${lblStyle}">${label}</label><select id="${id}" style="${inputStyle}cursor:pointer;">${options.map(o=>`<option value="${o}" ${selVal===o?"selected":""} style="background:#0D1F14;">${o}</option>`).join("")}</select></div>`;
  }
  if(type==="textarea"){
    return `<div style="${wrap}"><label style="${lblStyle}">${label}</label><textarea id="${id}" rows="3" style="${inputStyle}resize:vertical;" onfocus="this.style.borderColor='#5BAF73'" onblur="this.style.borderColor='rgba(255,255,255,0.07)'">${escH(val)}</textarea></div>`;
  }
  return `<div style="${wrap}"><label style="${lblStyle}">${label}</label><input id="${id}" value="${escH(val)}" style="${inputStyle}" onfocus="this.style.borderColor='#5BAF73'" onblur="this.style.borderColor='rgba(255,255,255,0.07)'"/></div>`;
}

function saveNGO(id){
  const name=$("ngoName").value.trim();
  if(!name){ showToast("Organization name is required","error"); return; }
  if(!$("ngoEmail").value.trim()){ showToast("Email is required","error"); return; }

  const data = {
    name, type:$("ngoType").value, city:$("ngoCity").value.trim(), state:$("ngoState").value.trim(),
    desc:$("ngoDesc").value.trim(), address:$("ngoAddress").value.trim(),
    phone:$("ngoPhone").value.trim(), email:$("ngoEmail").value.trim(),
    website:$("ngoWebsite").value.trim(), since:$("ngoSince").value.trim(),
    beneficiaries:$("ngoBeneficiaries").value.trim(), status:$("ngoStatus").value,
    accent:"#5BAF73", lat:0, lng:0, portal:"",
    tags:[data&&data.tags||[]],
    bank:{ accName:$("bankAccName").value.trim(), accNum:$("bankAccNum").value.trim(), ifsc:$("bankIFSC").value.trim(), bankName:$("bankName").value.trim(), branch:$("bankBranch").value.trim(), accType:$("bankAccType").value, short:$("bankName").value.trim().substring(0,4).toUpperCase() },
    upi:{ id:$("upiId").value.trim(), name:$("upiName").value.trim() }
  };
  const ACCENTS=["#5BAF73","#D4A043","#7BC67A","#4ABFBF","#A86FD4","#A8C44A","#C4613A"];
  if(id){
    const idx=STORE.ngos.findIndex(x=>x.id===id);
    data.id=id; data.tags=STORE.ngos[idx].tags||[];
    data.accent=STORE.ngos[idx].accent;
    STORE.ngos[idx]={...STORE.ngos[idx],...data};
    showToast(`${name} updated`);
  } else {
    data.id=STORE.nextId++; data.tags=[]; data.accent=ACCENTS[data.id%ACCENTS.length];
    STORE.ngos.push(data); showToast(`${name} added successfully`);
  }
  closeModal(); render(); renderNGOTab();
}

  const title=$("evTitle").value.trim();
  if(!title){ showToast("Event title is required","error"); return; }
  const data={ title, desc:$("evDesc").value.trim(), date:$("evDate").value, location:$("evLocation").value.trim(), ngoId:parseInt($("evNgo").value), status:"active" };
  if(id){ const idx=STORE.events.findIndex(x=>x.id===id); data.id=id; STORE.events[idx]={...STORE.events[idx],...data}; showToast("Event updated"); }
  else { data.id=STORE.nextEventId++; STORE.events.push(data); showToast("Event added"); }
  closeModal(); renderEventsTab();
}

function showModal(){ const b=$("modalBackdrop"); b.style.display="flex"; setTimeout(()=>b.style.animation="fadeIn 0.2s ease",10); }
function closeModal(){ $("modalBackdrop").style.display="none"; }


// ── ADMIN PHOTO/LOGO UPLOAD ──
let adminLogoDataUrl = null;
let adminPhotos = [];

function adminHandleLogo(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    adminLogoDataUrl = ev.target.result;
    document.getElementById('adminLogoPreview').src = adminLogoDataUrl;
    document.getElementById('adminLogoPreview').style.display = 'block';
    document.getElementById('adminLogoPlaceholder').style.display = 'none';
    document.getElementById('adminLogoRemove').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function adminRemoveLogo(){
  adminLogoDataUrl = null;
  document.getElementById('adminLogoPreview').style.display = 'none';
  document.getElementById('adminLogoPlaceholder').style.display = 'block';
  document.getElementById('adminLogoRemove').style.display = 'none';
}

function adminHandlePhotos(e){
  const files = Array.from(e.target.files);
  const remaining = 5 - adminPhotos.length;
  files.slice(0, remaining).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      adminPhotos.push({ dataUrl: ev.target.result, name: file.name });
      adminRenderPhotos();
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('adminPhotoInput').value = '';
}

function adminRemovePhoto(idx){
  adminPhotos.splice(idx, 1);
  adminRenderPhotos();
}

function adminRenderPhotos(){
  const grid = document.getElementById('adminPhotoGrid');
  const cnt = document.getElementById('adminPhotoCount');
  if(!grid || !cnt) return;
  cnt.textContent = adminPhotos.length + ' / 5 photos';
  grid.innerHTML = adminPhotos.map((p,i) => `
    <div style="position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;background:#111F17;border:1px solid rgba(255,255,255,0.07);">
      <img src="${p.dataUrl}" style="width:100%;height:100%;object-fit:cover;display:block;" alt="Photo ${i+1}"/>
      <button onclick="adminRemovePhoto(${i})" style="position:absolute;top:2px;right:2px;background:rgba(196,97,58,0.85);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:0.6rem;cursor:pointer;">✕</button>
    </div>`).join('');
}

// Reset photo state when opening modal
const _origOpenNGO = openNGOForm;

// ── INIT ──
render();
</script>
